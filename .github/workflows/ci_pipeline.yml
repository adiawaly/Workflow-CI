name: CI MLflow Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub scikit-learn pandas
          
      - name: Run MLflow Project
        run: mlflow run MLProject --env-manager=local
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/adiawaly/MLOps_Food_Delivery.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          # Kunci agar DagsHub tidak meminta otorisasi browser
          DAGSHUB_USER_TOKEN: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/adiawaly/MLOps_Food_Delivery.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          DAGSHUB_USER_TOKEN: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          cat << 'EOF' > get_run_id.py
          import mlflow
          runs = mlflow.search_runs(
              experiment_names=['Food_Delivery_Classification'], 
              filter_string="status = 'FINISHED'", 
              order_by=['start_time DESC']
          )
          print(runs.iloc[0]['run_id'])
          EOF
          
          RUN_ID=$(python get_run_id.py)
          echo "Run ID terbaru yang memiliki model: $RUN_ID"
          
          mlflow models build-docker --model-uri runs:/$RUN_ID/model --name ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-model:latest
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-model:latest