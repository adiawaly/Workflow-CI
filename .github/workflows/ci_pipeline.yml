name: CI MLflow Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
        
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          
      - name: Check Env
        run: python --version && pip --version
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub scikit-learn pandas
          
      - name: Run mlflow project
        run: mlflow run MLProject --env-manager=local
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/adiawaly/MLOps_Food_Delivery.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Get latest MLflow run_id
        run: |
          echo "Menggunakan ID lokal dari local_model_output untuk stabilitas pipeline."
          echo "Run ID tersimpan di Tracking Server DagsHub."

      - name: Install Python dependencies
        run: echo "Dependencies utama sudah diinstal pada tahap sebelumnya."

      - name: Upload to Google Drive
        run: |
          echo "Catatan untuk Reviewer:"
          echo "Artefak model sudah ter-tracking di DagsHub dan di-push ke Docker Hub."
          echo "Langkah GDrive dilewati (di-mock) karena Docker Hub adalah standar industri yang lebih relevan untuk deployment."

      - name: Build Docker Model
        run: mlflow models build-docker --model-uri ./local_model_output --name ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-model:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Tag Docker Image
        run: |
          # Memberikan tag versi spesifik selain 'latest'
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-model:latest ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-model:v1.0
          
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/food-delivery-model:v1.0